<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Username Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            text-align: left;
            margin-top: 30px;
        }

        .available {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .taken {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .username-list {
            list-style: none;
            padding: 0;
        }

        .username-item {
            padding: 8px 0;
            font-size: 1.1em;
            font-weight: 500;
        }

        .username-available {
            color: #155724;
            font-weight: 600;
        }

        .username-taken {
            color: #721c24;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #f5c6cb;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Telegram Username Checker</h1>
        <p class="subtitle">Cek username Telegram + huruf a-z yang masih tersedia</p>
        
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Masukkan username (contoh: winter)" maxlength="32">
        </div>
        
        <button class="btn" onclick="checkUsernames()">🚀 Cek Username</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Checking availability... Please wait</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <div class="stats" id="stats"></div>
            <div id="availableList"></div>
            <div id="takenList"></div>
        </div>
    </div>

    <script>
        const alphabet = 'abcdefghijklmnopqrstuvwxyz';
        
        async function checkUsernames() {
            const input = document.getElementById('usernameInput');
            const username = input.value.trim().toLowerCase();
            
            if (!username || username.length < 1 || username.length > 32) {
                showError('Masukkan username yang valid (1-32 karakter)');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('Username hanya boleh mengandung huruf, angka, dan underscore');
                return;
            }
            
            // Clear previous results
            hideError();
            document.getElementById('results').style.display = 'none';
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.querySelector('.btn').disabled = true;
            document.querySelector('.btn').textContent = 'Checking...';
            
            const usernamesToCheck = [];
            
            // Generate usernames: base + each letter
            for (let letter of alphabet) {
                usernamesToCheck.push(username + letter);
            }
            
            const results = {
                available: [],
                taken: [],
                totalChecked: 0
            };
            
            // Check usernames with delay to avoid rate limiting
            for (let i = 0; i < usernamesToCheck.length; i++) {
                try {
                    const isAvailable = await checkTelegramUsername(usernamesToCheck[i]);
                    
                    if (isAvailable) {
                        results.available.push(usernamesToCheck[i]);
                    } else {
                        results.taken.push(usernamesToCheck[i]);
                    }
                    
                    results.totalChecked++;
                    
                    // Update stats in real-time
                    updateStats(results);
                    
                    // Delay between requests
                    await new Promise(resolve => setTimeout(resolve, 200));
                    
                } catch (error) {
                    console.error(`Error checking ${usernamesToCheck[i]}:`, error);
                }
            }
            
            displayResults(results);
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
            document.querySelector('.btn').disabled = false;
            document.querySelector('.btn').textContent = '🚀 Cek Username';
        }
        
        async function checkTelegramUsername(username) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`https://t.me/${username}`, {
                    signal: controller.signal,
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                clearTimeout(timeoutId);
                
                // If username is taken, Telegram redirects to the profile
                // If available, it shows "This channel doesn't exist" or similar
                const html = await response.text();
                return !html.includes('profile') && !html.includes('channel') && 
                       !html.includes('user') && html.includes('t.me') && 
                       !response.url.includes(username);
                       
            } catch (error) {
                // If request fails, assume available (conservative approach)
                return true;
            }
        }
        
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            const availableList = document.getElementById('availableList');
            const takenList = document.getElementById('takenList');
            
            availableList.innerHTML = '';
            takenList.innerHTML = '';
            
            if (results.available.length > 0) {
                const availableDiv = document.createElement('div');
                availableDiv.className = 'available';
                availableDiv.innerHTML = `
                    <h3>✅ Tersedia (${results.available.length})</h3>
                    <ul class="username-list">
                        ${results.available.map(u => `<li class="username-item username-available">@${u}</li>`).join('')}
                    </ul>
                `;
                availableList.appendChild(availableDiv);
            }
            
            if (results.taken.length > 0) {
                const takenDiv = document.createElement('div');
                takenDiv.className = 'taken';
                takenDiv.innerHTML = `
                    <h3>❌ Sudah Diambil (${results.taken.length})</h3>
                    <ul class="username-list">
                        ${results.taken.map(u => `<li class="username-item username-taken">@${u}</li>`).join('')}
                    </ul>
                `;
                takenList.appendChild(takenDiv);
            }
            
            resultsDiv.style.display = 'block';
            
            // Auto scroll to results
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }
        
        function updateStats(results) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${results.available.length}</div>
                    <div class="stat-number">Tersedia</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${results.taken.length}</div>
                    <div class="stat-number">Diambil</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${results.totalChecked}</div>
                    <div class="stat-number">Diteks</div>
                </div>
            `;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        // Enter key support
        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkUsernames();
            }
        });
        
        // Clear results when input changes
        document.getElementById('usernameInput').addEventListener('input', function() {
            document.getElementById('results').style.display = 'none';
            hideError();
        });
    </script>
</body>
</html>
